<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="hearts-container" id="heartsContainer"></div>

    <div class="card">
        <div class="heart-icon">💝</div>
        
        <h1>Hai Cantik ✨</h1>
        <p class="opening-text">Ada pesan kecil yang tulus dari lubuk hatiku nih buat kamu. Coba klik tombol di bawah ya!</p>
        
        <button id="btnPesan" class="btn">Buka Pesan ❤️</button>

        <div id="pesanRahasia" class="hidden">
            <hr>
            <p class="isi-pesan">
                "Makasih ya udah selalu ada dan jadi alasan aku buat tersenyum setiap hari. 
                Semoga hari-hari kamu selalu bahagia, dan inget... aku selalu dukung kamu di sini. <i>I love you!</i>"
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
